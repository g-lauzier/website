<div class="gl-post-gallery-grid" style="margin: 2rem 0;">
  {% for gallery in page.gallery %}
  <a href="{{ gallery.img }}" class="gl-post-gallery-item" target="_blank" rel="noopener">
    <img src="{{ gallery.img }}" alt="{{ gallery.alt | default: gallery.caption | default: 'Gallery Image' }}" />
    {% if gallery.caption %}<div class="gl-post-gallery-caption">{{ gallery.caption }}</div>{% endif %}
  </a>
  {% endfor %}
</div>
